<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --success: #00c853;
            --error: #ff5252;
            --bg: #0b0e11;
            --panel: rgba(255, 255, 255, 0.07);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 15px;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            width: 100%;
            max-width: 360px;
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: var(--panel);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .balance-val { font-size: 20px; font-weight: 900; color: var(--success); }
        .coef-val { font-size: 22px; font-weight: 900; color: #ffab00; }

        .history {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            width: 100%;
            max-width: 360px;
            height: 25px;
        }
        .hist-item {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            background: var(--panel);
            animation: popIn 0.3s ease;
        }
        .hist-win { color: var(--success); border: 1px solid var(--success); }
        .hist-lose { color: var(--error); border: 1px solid var(--error); }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 12px;
            background: var(--panel);
            border-radius: 20px;
            margin-bottom: 15px;
        }

        .cell {
            width: 55px;
            height: 55px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
        }

        .cell.win { background: linear-gradient(135deg, #00c853, #1b5e20); animation: pulse 0.5s ease; }
        .cell.lose { background: linear-gradient(135deg, #ff5252, #b71c1c); }
        .cell.revealed { opacity: 0.3; transform: scale(0.8); }

        .controls { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 10px; }

        .bet-tools { display: flex; gap: 5px; margin-top: 5px; }
        .tool-btn {
            flex: 1; background: var(--panel); border: 1px solid rgba(255,255,255,0.1);
            color: white; border-radius: 8px; padding: 6px; font-size: 11px; cursor: pointer;
        }

        .bomb-selector { display: flex; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 14px; gap: 4px; }
        .bomb-btn { flex: 1; padding: 10px; border: none; background: transparent; color: #666; font-weight: 900; border-radius: 10px; }
        .bomb-btn.active { background: white; color: black; }

        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; text-align: center; font-size: 18px; box-sizing: border-box; }

        .action-group { display: flex; gap: 10px; }
        .action-btn { flex: 1; border: none; border-radius: 14px; padding: 16px; font-weight: 900; font-size: 16px; text-transform: uppercase; cursor: pointer; color: white; }
        .btn-start { background: linear-gradient(to right, #00d2ff, #3a7bd5); }
        .btn-cashout { background: linear-gradient(to right, #f2994a, #f2c94c); color: black; }
        .btn-risk { background: rgba(255,255,255,0.1); border: 1px solid white; max-width: 80px; }

        .disabled { opacity: 0.4; pointer-events: none; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <div><div style="font-size: 10px; color: #aaa;">ГАМАНЕЦЬ</div><div class="balance-val" id="bal">1000</div></div>
        <div style="text-align: right;"><div style="font-size: 10px; color: #aaa;">МНОЖНИК</div><div class="coef-val" id="mult">x1.00</div></div>
    </div>

    <div class="history" id="history"></div>

    <div class="grid" id="grid"></div>

    <div class="controls">
        <div id="setupArea">
            <div class="bomb-selector">
                <button class="bomb-btn" onclick="setBombs(3, this)">3</button>
                <button class="bomb-btn active" onclick="setBombs(5, this)">5</button>
                <button class="bomb-btn" onclick="setBombs(10, this)">10</button>
                <button class="bomb-btn" onclick="setBombs(20, this)">20</button>
            </div>
            <div class="bet-tools">
                <button class="tool-btn" onclick="adjustBet('min')">MIN</button>
                <button class="tool-btn" onclick="adjustBet('half')">1/2</button>
                <button class="tool-btn" onclick="adjustBet('double')">x2</button>
                <button class="tool-btn" onclick="adjustBet('max')">MAX</button>
            </div>
            <input type="number" id="betField" value="100" style="margin-top:10px">
        </div>

        <div class="action-group">
            <button id="sBtn" class="action-btn btn-start" onclick="start()">Грати</button>
            <button id="riskBtn" class="action-btn btn-risk disabled" onclick="randomClick()">🎲</button>
            <button id="cBtn" class="action-btn btn-cashout" style="display:none" onclick="cashout()">Забрати</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let balance = parseInt(localStorage.getItem('user_bal')) || 1000;
        let bombsCount = 5, bombs = [], active = false, gemsFound = 0, currentCoef = 1.0;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function adjustBet(type) {
            let b = parseInt(document.getElementById('betField').value) || 0;
            if(type==='min') b=10; else if(type==='half') b=Math.floor(b/2);
            else if(type==='double') b*=2; else if(type==='max') b=balance;
            document.getElementById('betField').value = Math.max(10, Math.min(b, balance));
        }

        function setBombs(n, el) {
            if(active) return;
            bombsCount = n;
            document.querySelectorAll('.bomb-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function createBoard() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let i=0; i<25; i++) {
                let c = document.createElement('div'); c.className = 'cell';
                c.onclick = () => clickCell(i, c); g.appendChild(c);
            }
        }

        function start() {
            let bet = parseInt(document.getElementById('betField').value);
            if(bet > balance || bet <= 0) return tg.showAlert("Мало монет!");
            
            balance -= bet; active = true; gemsFound = 0; currentCoef = 1.0; bombs = [];
            while(bombs.length < bombsCount) {
                let r = Math.floor(Math.random()*25); if(!bombs.includes(r)) bombs.push(r);
            }
            createBoard(); updateUI();
            document.getElementById('sBtn').style.display = 'none';
            document.getElementById('cBtn').style.display = 'block';
            document.getElementById('setupArea').classList.add('disabled');
            document.getElementById('riskBtn').classList.remove('disabled');
            playSound(440, 'sine', 0.1);
        }

        function clickCell(i, el) {
            if(!active || el.innerText !== '') return;
            if(bombs.includes(i)) {
                el.innerText = '💣'; el.classList.add('lose'); 
                playSound(100, 'sawtooth', 0.3); endGame(false);
            } else {
                el.innerText = '💎'; el.classList.add('win'); gemsFound++;
                let chance = (25 - bombsCount - (gemsFound - 1)) / (25 - gemsFound + 1);
                currentCoef = currentCoef * (1 / chance) * 0.97;
                updateUI();
                playSound(600 + (gemsFound*50), 'sine', 0.1);
                tg.HapticFeedback.impactOccurred('medium');
                if(gemsFound === (25-bombsCount)) cashout();
            }
        }

        function randomClick() {
            if(!active) return;
            const cells = document.querySelectorAll('.cell');
            const empty = Array.from(cells).map((c, i) => c.innerText === '' ? i : null).filter(v => v !== null);
            const rand = empty[Math.floor(Math.random() * empty.length)];
            clickCell(rand, cells[rand]);
        }

        function cashout() {
            if(!active || gemsFound === 0) return;
            balance += Math.floor(parseInt(document.getElementById('betField').value) * currentCoef);
            addHistory(currentCoef, true);
            playSound(880, 'sine', 0.2);
            tg.HapticFeedback.notificationOccurred('success');
            endGame(true);
        }

        function endGame(win) {
            active = false;
            document.getElementById('sBtn').style.display = 'block';
            document.getElementById('cBtn').style.display = 'none';
            document.getElementById('setupArea').classList.remove('disabled');
            document.getElementById('riskBtn').classList.add('disabled');
            if(!win) addHistory(currentCoef, false);
            const cells = document.getElementsByClassName('cell');
            bombs.forEach(b => { if(cells[b].innerText === '') { cells[b].innerText = '💣'; cells[b].classList.add('revealed'); }});
            updateUI();
        }

        function addHistory(c, win) {
            const h = document.getElementById('history');
            const i = document.createElement('div');
            i.className = `hist-item ${win?'hist-win':'hist-lose'}`;
            i.innerText = `x${c.toFixed(2)}`;
            h.prepend(i); if(h.children.length > 7) h.lastChild.remove();
        }

        function updateUI() {
            document.getElementById('bal').innerText = balance;
            document.getElementById('mult').innerText = 'x' + currentCoef.toFixed(2);
            document.getElementById('cBtn').innerText = `Забрати ${(parseInt(document.getElementById('betField').value)*currentCoef).toFixed(0)}`;
            localStorage.setItem('user_bal', balance);
        }

        createBoard(); updateUI();
    </script>
</body>
</html>
