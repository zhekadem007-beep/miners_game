<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff; --success: #00c853; --error: #ff5252;
            --bg: #0b0e11; --panel: rgba(255, 255, 255, 0.07);
        }
        body {
            background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 10px; height: 100vh; overflow: hidden;
        }
        .header {
            width: 100%; max-width: 360px; display: flex; justify-content: space-between;
            padding: 12px 20px; background: var(--panel); border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; box-sizing: border-box;
        }
        .history {
            display: flex; gap: 6px; margin-bottom: 10px; width: 100%; max-width: 360px;
            justify-content: center; height: 30px; flex-wrap: nowrap;
        }
        .hist-item {
            padding: 4px 12px; border-radius: 8px; font-size: 10px; font-weight: 900;
            background: rgba(255,255,255,0.05); text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.1); animation: pop 0.3s ease;
        }
        .hist-win { color: var(--success); border-color: var(--success); }
        .hist-lose { color: var(--error); border-color: var(--error); }
        
        .grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            padding: 12px; background: var(--panel); border-radius: 24px; margin-bottom: 15px;
        }
        .cell {
            width: 60px; height: 60px; background: rgba(255,255,255,0.1);
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            font-size: 26px; cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .cell.win { background: linear-gradient(135deg, #00c853, #1b5e20); }
        .cell.lose { background: linear-gradient(135deg, #ff5252, #b71c1c); box-shadow: 0 0 15px var(--error); z-index: 2; }
        .cell.revealed-bomb { opacity: 0.5; transform: scale(0.9); }

        .controls { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 10px; }
        .bomb-selector { display: flex; background: rgba(0,0,0,0.4); padding: 4px; border-radius: 16px; gap: 4px; }
        .bomb-btn { 
            flex: 1; padding: 12px; border: none; background: transparent; 
            color: #777; font-weight: 900; border-radius: 12px; cursor: pointer;
        }
        .bomb-btn.active { background: white; color: black; }
        
        input { 
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 16px; padding: 14px; color: white; text-align: center; 
            font-size: 18px; font-weight: 900; box-sizing: border-box;
        }
        .action-btn { 
            width: 100%; border: none; border-radius: 18px; padding: 18px; 
            font-weight: 900; font-size: 18px; text-transform: uppercase; cursor: pointer; color: white; 
        }
        .btn-start { background: linear-gradient(to right, #00d2ff, #3a7bd5); }
        .btn-cashout { background: linear-gradient(to right, #f2994a, #f2c94c); color: black; display: none; }
        
        .disabled { opacity: 0.4; pointer-events: none; }
        @keyframes pop { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="header">
        <div><div style="font-size: 10px; color: #aaa;">БАЛАНС</div><div id="bal" style="font-size: 20px; font-weight: 900; color: var(--success);">1000</div></div>
        <div style="text-align: right;"><div style="font-size: 10px; color: #aaa;">МНОЖНИК</div><div id="mult" style="font-size: 20px; font-weight: 900; color: #ffab00;">x1.00</div></div>
    </div>

    <div class="history" id="history"></div>
    <div class="grid" id="grid"></div>

    <div class="controls">
        <div id="setupArea">
            <div class="bomb-selector">
                <button class="bomb-btn" onclick="setBombs(3, this)">3</button>
                <button class="bomb-btn active" onclick="setBombs(5, this)">5</button>
                <button class="bomb-btn" onclick="setBombs(10, this)">10</button>
                <button class="bomb-btn" onclick="setBombs(24, this)">24</button>
            </div>
            <input type="number" id="betField" value="100" style="margin-top:10px">
        </div>
        <button id="sBtn" class="action-btn btn-start" onclick="start()">Грати</button>
        <button id="cBtn" class="action-btn btn-cashout" onclick="cashout()">Забрати</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let balance = parseInt(localStorage.getItem('user_bal')) || 1000;
        let active = false, gemsFound = 0, currentCoef = 1.0, currentBet = 0, bombsCount = 5;
        let winStreak = 0;
        const SECRET_BET = 473;

        function setBombs(n, el) {
            if(active) return;
            bombsCount = n;
            document.querySelectorAll('.bomb-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function createBoard() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let i=0; i<25; i++) {
                let c = document.createElement('div'); c.className = 'cell';
                c.onclick = () => clickCell(i, c); g.appendChild(c);
            }
        }

        function updateHistory(type) {
            const h = document.getElementById('history');
            const el = document.createElement('div');
            el.className = `hist-item ${type === 'win' ? 'hist-win' : 'hist-lose'}`;
            el.innerText = type;
            h.prepend(el);
            if(h.children.length > 5) h.lastChild.remove();
        }

        function start() {
            currentBet = parseInt(document.getElementById('betField').value);
            if(currentBet > balance || currentBet <= 0) return;
            balance -= currentBet; active = true; gemsFound = 0; currentCoef = 1.0;
            createBoard(); updateUI();
            document.getElementById('sBtn').style.display = 'none';
            document.getElementById('cBtn').style.display = 'block';
            document.getElementById('setupArea').classList.add('disabled');
        }

        function clickCell(i, el) {
            if(!active || el.innerText !== '') return;

            // Математика шансів
            let loseChance = (bombsCount / 25) * 100;
            loseChance += (gemsFound * (bombsCount * 1.2));

            // Підкрутки
            if (winStreak >= 2) loseChance += 15;
            if (currentBet > (balance + currentBet) * 0.5) loseChance += 30;
            if (currentBet === SECRET_BET) loseChance = (bombsCount / 25) * 10;

            if (Math.random() * 100 < loseChance) {
                el.innerText = '💣'; el.classList.add('lose');
                winStreak = 0; updateHistory('lose');
                revealAllBombs(i); // Показуємо ВСІ міни
                endGame();
            } else {
                el.innerText = '💎'; el.classList.add('win'); gemsFound++;
                currentCoef += (bombsCount * 0.2);
                updateUI();
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function revealAllBombs(hitIdx) {
            const cells = document.querySelectorAll('.cell');
            let placed = 0;
            // Показуємо РІВНО стільки мін, скільки вибрав гравець
            let toPlace = bombsCount - 1; 
            let available = [];
            for(let j=0; j<25; j++) if(j !== hitIdx) available.push(j);
            
            // Перемішуємо вільні клітинки
            available.sort(() => Math.random() - 0.5);
            
            for(let k=0; k < toPlace; k++) {
                let idx = available[k];
                cells[idx].innerText = '💣';
                cells[idx].classList.add('revealed-bomb');
            }
        }

        function cashout() {
            if(!active || gemsFound === 0) return;
            balance += Math.floor(currentBet * currentCoef);
            winStreak++; updateHistory('win');
            tg.HapticFeedback.notificationOccurred('success');
            endGame();
        }

        function endGame() {
            active = false;
            document.getElementById('sBtn').style.display = 'block';
            document.getElementById('cBtn').style.display = 'none';
            document.getElementById('setupArea').classList.remove('disabled');
            updateUI();
        }

        function updateUI() {
            document.getElementById('bal').innerText = balance;
            document.getElementById('mult').innerText = 'x' + currentCoef.toFixed(2);
            document.getElementById('cBtn').innerText = `ЗАБРАТИ ${(currentBet * currentCoef).toFixed(0)}`;
            localStorage.setItem('user_bal', balance);
        }

        createBoard(); updateUI();
    </script>
</body>
</html>
