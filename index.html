<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0e1015;
            --bg-panel: #1a1d24;
            --accent-yellow: #f1b32d;
            --text-main: #ffffff;
            --text-muted: #626d7a;
            --win-color: #2ecc71;
            --lose-color: #e74c3c;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Exo 2', sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Шапка як у Diamond Rush */
        .header {
            width: 100%; max-width: 400px;
            display: flex; justify-content: space-between;
            background: var(--bg-panel); padding: 15px 20px;
            border-radius: 15px; margin-bottom: 25px; box-sizing: border-box;
        }
        .stat-group { display: flex; flex-direction: column; }
        .stat-label { color: var(--text-muted); font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .stat-val { font-size: 22px; font-weight: 900; }
        .yellow { color: var(--accent-yellow); }

        /* Колесо */
        .wheel-container {
            position: relative; width: 260px; height: 260px; margin-bottom: 25px;
        }
        .wheel-wrap {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, #1e222d 0%, #11141b 100%);
            border: 8px solid var(--bg-panel); position: relative; overflow: hidden;
        }
        #sector {
            position: absolute; width: 100%; height: 100%;
            background: conic-gradient(var(--accent-yellow) 0deg, transparent 0deg);
            opacity: 0.15;
        }
        #arrow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; transition: transform 3.8s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 30px; background: var(--accent-yellow);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
        }
        .center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; background: var(--bg-panel);
            border: 4px solid #252a36; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 11;
        }

        /* Кнопки */
        .controls { width: 100%; max-width: 400px; }
        .modes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .m-btn {
            background: var(--bg-panel); border: 1px solid #2d323e;
            color: white; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer;
        }
        .m-btn.active { border-color: var(--accent-yellow); color: var(--accent-yellow); }

        .input-box {
            background: var(--bg-panel); border-radius: 12px; padding: 16px; margin-bottom: 15px;
        }
        input {
            background: transparent; border: none; color: white; font-size: 28px;
            font-weight: 900; width: 100%; text-align: center; outline: none;
        }

        .play-btn {
            width: 100%; background: var(--accent-yellow); border: none;
            padding: 20px; border-radius: 15px; color: #000; font-size: 19px;
            font-weight: 900; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 4px 0 #b38000;
        }
        .play-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b38000; }

        #status { font-weight: 800; height: 25px; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stat-group">
            <span class="stat-label">Баланс</span>
            <span class="stat-val yellow" id="bal-ui">0 ₴</span>
        </div>
        <div class="stat-group" style="text-align: right;">
            <span class="stat-label">Можливий виграш</span>
            <span class="stat-val" id="win-ui" style="color: var(--win-color);">0 ₴</span>
        </div>
    </div>

    <div class="wheel-container">
        <div class="wheel-wrap"><div id="sector"></div></div>
        <div id="arrow"><div class="pointer"></div></div>
        <div class="center">
            <div id="perc-ui" style="font-size: 30px; font-weight: 900; color: var(--accent-yellow);">50%</div>
            <div class="stat-label" style="font-size: 8px;">шанс</div>
        </div>
    </div>

    <div id="status"></div>

    <div class="controls">
        <div class="modes">
            <button class="m-btn" onclick="updateChance(0.25, this)">25%</button>
            <button class="m-btn active" onclick="updateChance(0.5, this)">50%</button>
            <button class="m-btn" onclick="updateChance(0.75, this)">75%</button>
        </div>
        <div class="input-box">
            <input type="number" id="bet-input" value="100" oninput="sync()">
        </div>
        <button class="play-btn" id="btn" onclick="spin()">Покращити</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        // ВИКОРИСТОВУЄМО ТВОЙ КЛЮЧ 'user_bal' ЯК У МІНАХ
        let balance = parseInt(localStorage.getItem('user_bal')) || 1000;
        let chance = 0.5;
        let spinning = false;
        let rot = 0;

        function sync() {
            document.getElementById('bal-ui').innerText = balance + " ₴";
            localStorage.setItem('user_bal', balance); // Зберігаємо в той же ключ
            
            document.getElementById('sector').style.background = 
                `conic-gradient(var(--accent-yellow) 0deg ${chance * 360}deg, transparent 0deg)`;
            document.getElementById('perc-ui').innerText = (chance * 100) + "%";
            
            const b = parseInt(document.getElementById('bet-input').value) || 0;
            document.getElementById('win-ui').innerText = Math.floor(b * (1/chance) * 0.95) + " ₴";
        }

        function updateChance(v, b) {
            if(spinning) return;
            chance = v;
            document.querySelectorAll('.m-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            sync();
        }

        function spin() {
            const b = parseInt(document.getElementById('bet-input').value);
            if(b > balance || b <= 0 || spinning) return;

            balance -= b;
            spinning = true;
            document.getElementById('btn').disabled = true;
            document.getElementById('status').innerText = "";
            sync();

            const win = Math.random() < chance;
            const winAngle = chance * 360;
            let stop;

            if(win) {
                stop = Math.random() * (winAngle * 0.8) + (winAngle * 0.1);
            } else {
                stop = winAngle + Math.random() * ((360 - winAngle) * 0.8) + 5;
            }

            const total = rot + (360 * 6) + (360 - (rot % 360)) + stop;
            rot = total;
            document.getElementById('arrow').style.transform = `rotate(${total}deg)`;

            setTimeout(() => {
                spinning = false;
                document.getElementById('btn').disabled = false;
                if(win) {
                    const p = Math.floor(b * (1/chance) * 0.95);
                    balance += p;
                    document.getElementById('status').innerText = "Успіх!";
                    document.getElementById('status').style.color = "var(--win-color)";
                } else {
                    document.getElementById('status').innerText = "Програш";
                    document.getElementById('status').style.color = "var(--lose-color)";
                }
                sync();
            }, 3800);
        }
        sync();
    </script>
</body>
</html>
