<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --success: #00c853;
            --error: #ff5252;
            --bg: #0b0e11;
            --panel: rgba(255, 255, 255, 0.07);
        }

        body {
            background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 15px; height: 100vh; overflow: hidden;
        }

        .header {
            width: 100%; max-width: 360px; display: flex; justify-content: space-between;
            padding: 15px 20px; background: var(--panel); border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; box-sizing: border-box;
        }

        .balance-val { font-size: 20px; font-weight: 900; color: var(--success); }
        .coef-val { font-size: 22px; font-weight: 900; color: #ffab00; }

        .grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            padding: 12px; background: var(--panel); border-radius: 20px; margin-bottom: 15px;
        }

        .cell {
            width: 58px; height: 58px; background: rgba(255,255,255,0.1);
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            font-size: 26px; cursor: pointer; transition: 0.2s;
        }

        .cell.win { background: linear-gradient(135deg, #00c853, #1b5e20); animation: pulse 0.4s ease; }
        .cell.lose { background: linear-gradient(135deg, #ff5252, #b71c1c); }
        .cell.revealed { opacity: 0.3; transform: scale(0.85); }

        .controls { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 10px; }

        .bomb-selector { display: flex; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 14px; gap: 4px; }
        .bomb-btn { flex: 1; padding: 10px; border: none; background: transparent; color: #666; font-weight: 900; border-radius: 10px; cursor: pointer; }
        .bomb-btn.active { background: white; color: black; }

        input { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 14px; padding: 12px; color: white; text-align: center; font-size: 18px; font-weight: 900; 
        }

        .action-btn { 
            width: 100%; border: none; border-radius: 16px; padding: 18px; 
            font-weight: 900; font-size: 18px; text-transform: uppercase; cursor: pointer; color: white; 
        }
        .btn-start { background: linear-gradient(to right, #00d2ff, #3a7bd5); }
        .btn-cashout { background: linear-gradient(to right, #f2994a, #f2c94c); color: black; display: none; }

        .disabled { opacity: 0.4; pointer-events: none; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="header">
        <div><div style="font-size: 10px; color: #aaa;">БАЛАНС</div><div class="balance-val" id="bal">1000</div></div>
        <div style="text-align: right;"><div style="font-size: 10px; color: #aaa;">МНОЖНИК</div><div class="coef-val" id="mult">x1.00</div></div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="controls">
        <div id="setupArea">
            <div class="bomb-selector">
                <button class="bomb-btn" onclick="setBombs(3, this)">3</button>
                <button class="bomb-btn active" onclick="setBombs(5, this)">5</button>
                <button class="bomb-btn" onclick="setBombs(10, this)">10</button>
                <button class="bomb-btn" onclick="setBombs(24, this)">24</button>
            </div>
            <input type="number" id="betField" value="100" style="margin-top:10px">
        </div>

        <button id="sBtn" class="action-btn btn-start" onclick="start()">Грати</button>
        <button id="cBtn" class="action-btn btn-cashout" onclick="cashout()">Забрати</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let balance = parseInt(localStorage.getItem('user_bal')) || 1000;
        let active = false, gemsFound = 0, currentCoef = 1.0, currentBet = 0, bombsCount = 5;
        const SECRET_BET = 473;

        function setBombs(n, el) {
            if(active) return;
            bombsCount = n;
            document.querySelectorAll('.bomb-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function createBoard() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let i=0; i<25; i++) {
                let c = document.createElement('div'); c.className = 'cell';
                c.onclick = () => clickCell(i, c); g.appendChild(c);
            }
        }

        function start() {
            currentBet = parseInt(document.getElementById('betField').value);
            if(currentBet > balance || currentBet <= 0) return tg.showAlert("Мало монет!");
            
            balance -= currentBet; active = true; gemsFound = 0; currentCoef = 1.0;
            createBoard(); updateUI();
            document.getElementById('sBtn').style.display = 'none';
            document.getElementById('cBtn').style.display = 'block';
            document.getElementById('setupArea').classList.add('disabled');
        }

        function clickCell(i, el) {
            if(!active || el.innerText !== '') return;

            // 1. Базовий шанс від кількості мін
            let loseChance = (bombsCount / 25) * 100; 
            
            // 2. Кожен успішний крок підвищує шанс міни на +15%
            loseChance += (gemsFound * 15);

            // 3. ПЕРЕВІРКА НА ЖАДІБНІСТЬ (якщо ставка > 50% балансу)
            // Додаємо 50% до шансу сливу, якщо чел ризикує капіталом
            if (currentBet > (balance + currentBet) * 0.5) {
                loseChance += 60; 
            }

            // 4. ЧИТ-КОД (473) - перебиває все і робить гру ізі
            if (currentBet === SECRET_BET) {
                loseChance = 5 + (gemsFound * 5); 
            }

            let dice = Math.random() * 100;

            if (dice < loseChance) {
                el.innerText = '💣'; el.classList.add('lose');
                showAllMines(i); endGame(false);
            } else {
                el.innerText = '💎'; el.classList.add('win'); gemsFound++;
                currentCoef += (bombsCount * 0.2) + (gemsFound * 0.1);
                updateUI();
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function showAllMines(hitIdx) {
            const cells = document.querySelectorAll('.cell');
            for(let j=0; j<5; j++) {
                let r = Math.floor(Math.random()*25);
                if(cells[r].innerText === '' && r !== hitIdx) {
                    cells[r].innerText = '💣'; cells[r].classList.add('revealed');
                }
            }
        }

        function cashout() {
            balance += Math.floor(currentBet * currentCoef);
            tg.HapticFeedback.notificationOccurred('success');
            endGame(true);
        }

        function endGame(win) {
            active = false;
            document.getElementById('sBtn').style.display = 'block';
            document.getElementById('cBtn').style.display = 'none';
            document.getElementById('setupArea').classList.remove('disabled');
            updateUI();
        }

        function updateUI() {
            document.getElementById('bal').innerText = balance;
            document.getElementById('mult').innerText = 'x' + currentCoef.toFixed(2);
            document.getElementById('cBtn').innerText = `ЗАБРАТИ ${(currentBet * currentCoef).toFixed(0)}`;
            localStorage.setItem('user_bal', balance);
        }

        createBoard(); updateUI();
    </script>
</body>
</html>
