<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    background:#0b0e11;
    color:white;
    font-family:Inter;
    display:flex;
    flex-direction:column;
    align-items:center;
    margin:0;
    padding:10px;
}

.header {
    width:100%;
    max-width:360px;
    display:flex;
    justify-content:space-between;
    background:rgba(255,255,255,0.07);
    padding:12px;
    border-radius:15px;
    margin-bottom:10px;
}

.balance-val {color:#00c853;font-weight:900;}
.coef-val {color:#ffab00;font-weight:900;}

.grid {
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:6px;
    margin:10px 0;
}

.cell {
    width:60px;
    height:60px;
    background:rgba(255,255,255,0.08);
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
}

.win {background:#1b5e20;}
.lose {background:#b71c1c;}

.controls {width:100%;max-width:360px;}

button {
    padding:10px;
    border:none;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
}

.tool-btn {background:#222;color:white;flex:1;}
.row {display:flex;gap:5px;margin:5px 0;}

.action {display:flex;gap:10px;margin-top:10px;}
.start {background:#00d2ff;flex:1;}
.cash {background:#f2c94c;flex:1;}

.history {display:flex;gap:5px;overflow:hidden;margin-top:10px;}
.hist-item {
    font-size:10px;
    padding:4px 6px;
    border-radius:6px;
    background:#222;
}
.winH {border:1px solid #00c853;}
.loseH {border:1px solid #ff5252;}
</style>
</head>

<body>

<div class="header">
    <div>Баланс: <span class="balance-val" id="bal">1000</span></div>
    <div>Коеф: <span class="coef-val" id="coef">x1.00</span></div>
</div>

<div class="history" id="history"></div>

<div class="grid" id="grid"></div>

<div class="controls">

    <div class="row">
        <button class="tool-btn" onclick="setMines(3)">3💣</button>
        <button class="tool-btn" onclick="setMines(5)">5💣</button>
        <button class="tool-btn" onclick="setMines(10)">10💣</button>
        <button class="tool-btn" onclick="setMines(24)">24💣</button>
    </div>

    <input id="bet" type="number" value="100" style="width:100%;padding:10px;border-radius:10px;margin-top:5px;">

    <div class="action">
        <button class="start" onclick="start()">PLAY</button>
        <button class="cash" id="cash" onclick="cashout()" style="display:none">CASH</button>
    </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) tg.expand();

let balance = 1000;
let bet = 0;
let minesCount = 3;
let minePos = [];
let revealed = [];
let active = false;
let coef = 1;

const RTP = 0.50; // 🔥 50% система (гравець в середньому втрачає 50%)

function setMines(n){
    if(active) return;
    minesCount = n;
}

function createBoard(){
    const g = document.getElementById("grid");
    g.innerHTML = "";

    minePos = [];
    revealed = [];

    while(minePos.length < minesCount){
        let r = Math.floor(Math.random()*25);
        if(!minePos.includes(r)) minePos.push(r);
    }

    for(let i=0;i<25;i++){
        let d = document.createElement("div");
        d.className="cell";
        d.onclick=()=>click(i,d);
        g.appendChild(d);
    }
}

function start(){
    bet = +document.getElementById("bet").value;
    if(bet>balance||bet<=0) return;

    balance -= bet;
    coef = 1;
    active = true;

    createBoard();
    update();

    document.getElementById("cash").style.display="block";
}

function click(i,el){
    if(!active||revealed.includes(i)) return;
    revealed.push(i);

    if(minePos.includes(i)){
        el.innerHTML="💣";
        el.classList.add("lose");
        end(false);
        return;
    }

    el.innerHTML="💎";
    el.classList.add("win");

    // 🎯 50% RTP система (зрізає профіт)
    let gain = (0.35 + (minesCount/40)) * RTP;
    coef += gain;

    update();
}

function cashout(){
    if(!active) return;

    let win = Math.floor(bet * coef);

    balance += win;
    addHistory(true, win);

    end(true);
}

function end(win){
    active=false;
    document.getElementById("cash").style.display="none";

    if(!win) addHistory(false, 0);

    revealAll();
    update();
}

function revealAll(){
    const cells = document.querySelectorAll(".cell");
    minePos.forEach(i=>{
        cells[i].innerHTML="💣";
        cells[i].classList.add("lose");
    });
}

function addHistory(win,amount){
    const h=document.getElementById("history");
    let d=document.createElement("div");

    d.className="hist-item "+(win?"winH":"loseH");

    d.innerText = win
        ? `WIN x${coef.toFixed(2)} +${amount}`
        : `LOSE x${coef.toFixed(2)}`;

    h.prepend(d);
    if(h.children.length>6)h.lastChild.remove();
}

function update(){
    document.getElementById("bal").innerText=balance;
    document.getElementById("coef").innerText="x"+coef.toFixed(2);
}
</script>

</body>
</html>
