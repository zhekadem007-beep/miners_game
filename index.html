<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; touch-action: manipulation; }
        
        .header { display: flex; justify-content: space-between; width: 100%; max-width: 320px; margin-bottom: 15px; background: #1e1e1e; padding: 10px; border-radius: 12px; }
        .balance { color: #4caf50; font-weight: bold; }
        .coef { color: #ffaa00; font-weight: bold; }

        .status-msg { margin-bottom: 10px; height: 24px; font-weight: bold; color: #bbb; }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .cell { width: 55px; height: 55px; background: #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .cell.win { background: #2e7d32; border: 1px solid #4caf50; }
        .cell.lose { background: #c62828; border: 1px solid #ff5252; }
        .cell.disabled { pointer-events: none; }

        .controls { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 15px; }
        
        .bomb-selector { display: flex; justify-content: space-between; gap: 5px; }
        .bomb-btn { flex: 1; padding: 8px; background: #333; border: 1px solid #444; color: white; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .bomb-btn.active { background: #248b91; border-color: #4dd0e1; }

        .bet-box { display: flex; gap: 10px; }
        input { flex: 2; padding: 12px; border-radius: 10px; border: 2px solid #333; background: #1a1a1a; color: white; font-size: 16px; outline: none; }
        input:focus { border-color: #248b91; }

        .main-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-start { background: #248b91; }
        .btn-cashout { background: #ff8f00; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance">💰 <span id="balanceDisplay">1000</span></div>
        <div class="coef">x<span id="coefDisplay">1.00</span></div>
    </div>

    <div class="status-msg" id="statusMsg">Оберіть ставку та грайте</div>

    <div class="grid" id="grid"></div>

    <div class="controls">
        <div class="bomb-selector">
            <button class="bomb-btn" onclick="setBombs(3, this)">3 💣</button>
            <button class="bomb-btn active" onclick="setBombs(5, this)">5 💣</button>
            <button class="bomb-btn" onclick="setBombs(10, this)">10 💣</button>
            <button class="bomb-btn" onclick="setBombs(20, this)">20 💣</button>
        </div>

        <div class="bet-box">
            <input type="number" id="betInput" placeholder="Ставка" value="100">
            <button id="startBtn" class="main-btn btn-start" onclick="startGame()">СТАРТ</button>
            <button id="cashoutBtn" class="main-btn btn-cashout" onclick="cashout()">CASH</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseInt(localStorage.getItem('m_bal')) || 1000;
        let bet = 0;
        let coef = 1.0;
        let bombsCount = 5;
        let bombPositions = [];
        let gameActive = false;
        let openedCells = 0;

        function setBombs(count, btn) {
            if (gameActive) return;
            bombsCount = count;
            document.querySelectorAll('.bomb-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = balance;
            document.getElementById('coefDisplay').innerText = coef.toFixed(2);
            localStorage.setItem('m_bal', balance);
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = 'cell-' + i;
                cell.onclick = () => clickCell(i);
                grid.appendChild(cell);
            }
        }

        function startGame() {
            let inputVal = document.getElementById('betInput').value;
            bet = parseInt(inputVal);

            if (isNaN(bet) || bet <= 0 || bet > balance) {
                document.getElementById('statusMsg').innerText = "❌ Невірна ставка!";
                return;
            }

            balance -= bet;
            coef = 1.0;
            openedCells = 0;
            gameActive = true;
            bombPositions = [];

            while(bombPositions.length < bombsCount) {
                let r = Math.floor(Math.random() * 25);
                if(!bombPositions.includes(r)) bombPositions.push(r);
            }

            createGrid();
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('cashoutBtn').style.display = 'block';
            document.getElementById('statusMsg').innerText = "💎 Шукай діаманти!";
            document.getElementById('statusMsg').style.color = "#bbb";
            document.getElementById('betInput').disabled = true;
            updateUI();
        }

        function clickCell(idx) {
            if (!gameActive) return;
            const cell = document.getElementById('cell-' + idx);
            if (cell.classList.contains('disabled') || cell.innerText !== '') return;

            if (bombPositions.includes(idx)) {
                cell.innerText = '💣';
                cell.classList.add('lose');
                finishGame(false);
            } else {
                cell.innerText = '💎';
                cell.classList.add('win');
                cell.classList.add('disabled');
                openedCells++;
                
                // Розрахунок коефіцієнту залежно від кількості бомб
                let multiplier = bombsCount / 10;
                coef += 0.1 + multiplier + (openedCells * 0.02);
                
                document.getElementById('statusMsg').innerText = "Так тримати! +x" + coef.toFixed(2);
                updateUI();
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function cashout() {
            if (!gameActive || openedCells === 0) return;
            let win = Math.floor(bet * coef);
            balance += win;
            document.getElementById('statusMsg').innerText = "✅ Виграш: " + win + "!";
            document.getElementById('statusMsg').style.color = "#4caf50";
            finishGame(true);
        }

        function finishGame(isWin) {
            gameActive = false;
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('cashoutBtn').style.display = 'none';
            document.getElementById('betInput').disabled = false;

            // Відкриваємо всі бомби
            bombPositions.forEach(pos => {
                const bCell = document.getElementById('cell-' + pos);
                if (!bCell.classList.contains('lose')) {
                    bCell.innerText = '💣';
                    bCell.style.opacity = "0.5";
                }
            });

            // Блокуємо всі клітинки
            document.querySelectorAll('.cell').forEach(c => c.classList.add('disabled'));

            if (!isWin && bombPositions.length > 0) {
                document.getElementById('statusMsg').innerText = "💥 Ви підірвалися!";
                document.getElementById('statusMsg').style.color = "#ff5252";
                tg.HapticFeedback.notificationOccurred('error');
            }
            updateUI();
        }

        updateUI();
        createGrid();
    </script>
</body>
</html>
