<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
    --bg:#0b0e11;
    --panel:rgba(255,255,255,0.07);
    --win:#00c853;
    --lose:#ff5252;
}

body{
    margin:0;
    background:var(--bg);
    color:white;
    font-family:Inter;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:10px;
}

.header{
    width:100%;
    max-width:360px;
    display:flex;
    justify-content:space-between;
    background:var(--panel);
    padding:12px;
    border-radius:16px;
    margin-bottom:8px;
}

.history{
    display:flex;
    gap:6px;
    width:100%;
    max-width:360px;
    margin-bottom:8px;
    overflow:hidden;
}

.hist{
    font-size:10px;
    padding:4px 6px;
    border-radius:6px;
    background:rgba(255,255,255,0.08);
}
.winH{border:1px solid var(--win);}
.loseH{border:1px solid var(--lose);}

.grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:6px;
    padding:10px;
    background:var(--panel);
    border-radius:18px;
    margin-bottom:10px;
}

.cell{
    width:60px;
    height:60px;
    background:rgba(255,255,255,0.08);
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    cursor:pointer;
}

.win{background:#1b5e20;}
.lose{background:#b71c1c;}

.controls{width:100%;max-width:360px;}

.row{
    display:flex;
    gap:5px;
    margin-bottom:8px;
}

.btn{
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    font-weight:700;
}

.bomb.active{
    background:white;
    color:black;
}

.start{background:#00d2ff;}
.cash{background:#f2c94c;display:none;}
</style>
</head>

<body>

<div class="header">
    <div>Баланс: <span id="bal">1000</span></div>
    <div>Коеф: <span id="coef">x1.00</span></div>
</div>

<div class="history" id="history"></div>

<div class="grid" id="grid"></div>

<div class="controls">

<div class="row">
    <button class="btn bomb active" onclick="setBombs(3,this)">3</button>
    <button class="btn bomb" onclick="setBombs(5,this)">5</button>
    <button class="btn bomb" onclick="setBombs(10,this)">10</button>
    <button class="btn bomb" onclick="setBombs(24,this)">24</button>
</div>

<input id="bet" type="number" value="100" style="width:100%;padding:10px;border-radius:10px;margin-bottom:6px;">

<button id="startBtn" class="btn start" onclick="start()">ГРАТИ</button>
<button id="cashBtn" class="btn cash" onclick="cashout()">ЗАБРАТИ</button>

</div>

<script>
const tg = window.Telegram?.WebApp;

let balance = 1000;
let bet = 0;
let bombs = 5;
let active = false;
let coef = 1;
let opened = [];
let mines = [];

function setBombs(n,el){
    if(active) return;
    bombs = n;
    document.querySelectorAll('.bomb').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
}

function createBoard(){
    const g=document.getElementById("grid");
    g.innerHTML="";
    opened=[];
    mines=[];

    for(let i=0;i<25;i++){
        let d=document.createElement("div");
        d.className="cell";
        d.onclick=()=>click(i,d);
        g.appendChild(d);
    }
}

function generateMines(){
    let arr=[];
    for(let i=0;i<25;i++) arr.push(i);

    arr.sort(()=>Math.random()-0.5);
    mines = arr.slice(0,bombs);
}

function start(){
    bet=+document.getElementById("bet").value;
    if(bet>balance||bet<=0) return;

    balance-=bet;
    active=true;
    coef=1;

    createBoard();
    generateMines();

    document.getElementById("cashBtn").style.display="block";
    update();
}

function click(i,el){
    if(!active||opened.includes(i)) return;
    opened.push(i);

    if(mines.includes(i)){
        el.innerHTML="💣";
        el.classList.add("lose");
        reveal();
        addHistory(false);
        end();
        return;
    }

    el.innerHTML="💎";
    el.classList.add("win");

    let risk = bombs/25;
    coef += (0.2 + risk*0.8);

    update();
}

function reveal(){
    const cells=document.querySelectorAll(".cell");
    mines.forEach(i=>{
        cells[i].innerHTML="💣";
    });
}

function cashout(){
    if(!active) return;

    let win = Math.floor(bet*coef);
    balance+=win;

    addHistory(true);
    end();
}

function end(){
    active=false;
    document.getElementById("cashBtn").style.display="none";
    update();
}

function addHistory(win){
    const h=document.getElementById("history");
    let d=document.createElement("div");
    d.className="hist "+(win?"winH":"loseH");
    d.innerText=win?"WIN x"+coef.toFixed(2):"LOSE";
    h.prepend(d);
    if(h.children.length>6)h.lastChild.remove();
}

function update(){
    document.getElementById("bal").innerText=balance;
    document.getElementById("coef").innerText="x"+coef.toFixed(2);
}

createBoard();
update();
</script>

</body>
</html>
