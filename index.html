<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --success: #00c853;
            --error: #ff5252;
            --bg: #050505;
            --panel: rgba(255, 255, 255, 0.05);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            height: 100vh;
        }

        /* Анімація появи */
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .header {
            width: 100%;
            max-width: 340px;
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: var(--panel);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .balance-info div { font-size: 12px; color: #aaa; text-transform: uppercase; }
        .balance-val { font-size: 20px; font-weight: 900; color: var(--success); }
        .coef-val { font-size: 20px; font-weight: 900; color: #ffab00; }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 15px;
            background: var(--panel);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        .cell {
            width: 52px;
            height: 52px;
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.03);
        }

        .cell:active { transform: scale(0.9); }
        
        .cell.win { 
            background: linear-gradient(135deg, #00c853, #1b5e20); 
            animation: popIn 0.3s forwards;
            box-shadow: 0 0 15px rgba(0, 200, 83, 0.4);
        }

        .cell.lose { 
            background: linear-gradient(135deg, #ff5252, #b71c1c); 
            animation: popIn 0.3s forwards;
            box-shadow: 0 0 15px rgba(255, 82, 82, 0.4);
        }

        .controls {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bomb-selector {
            display: flex;
            background: rgba(0,0,0,0.3);
            padding: 4px;
            border-radius: 14px;
            gap: 4px;
        }

        .bomb-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #666;
            font-weight: 900;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .bomb-btn.active { background: white; color: black; }

        .bet-input-container {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 15px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            outline: none;
            text-align: center;
        }

        .action-btn {
            flex: 1.2;
            border: none;
            border-radius: 14px;
            font-weight: 900;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }

        .btn-start { background: linear-gradient(to right, #00d2ff, #3a7bd5); }
        .btn-cashout { 
            background: linear-gradient(to right, #f2994a, #f2c94c); 
            display: none;
            color: black;
        }

        .shake { animation: shake 0.4s; }
        .disabled { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-info">
            <div>Баланс</div>
            <div class="balance-val" id="bal">1000</div>
        </div>
        <div class="balance-info" style="text-align: right;">
            <div>Множник</div>
            <div class="coef-val" id="mult">x1.00</div>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="controls">
        <div class="bomb-selector" id="bSelector">
            <button class="bomb-btn" onclick="setBombs(3, this)">3</button>
            <button class="bomb-btn active" onclick="setBombs(5, this)">5</button>
            <button class="bomb-btn" onclick="setBombs(10, this)">10</button>
            <button class="bomb-btn" onclick="setBombs(20, this)">20</button>
        </div>

        <div class="bet-input-container">
            <input type="number" id="betField" value="100" inputmode="numeric">
            <button id="sBtn" class="action-btn btn-start" onclick="start()">Старт</button>
            <button id="cBtn" class="action-btn btn-cashout" onclick="cashout()">Забрати</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseInt(localStorage.getItem('user_bal')) || 1000;
        let bet = 0;
        let bombsCount = 5;
        let bombs = [];
        let active = false;
        let gemsFound = 0;
        let currentCoef = 1.0;

        function setBombs(n, el) {
            if(active) return;
            bombsCount = n;
            document.querySelectorAll('.bomb-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function updateUI() {
            document.getElementById('bal').innerText = balance;
            document.getElementById('mult').innerText = 'x' + currentCoef.toFixed(2);
            localStorage.setItem('user_bal', balance);
        }

        function createBoard() {
            const g = document.getElementById('grid');
            g.innerHTML = '';
            for(let i=0; i<25; i++) {
                let c = document.createElement('div');
                c.className = 'cell';
                c.onclick = () => clickCell(i, c);
                g.appendChild(c);
            }
        }

        function start() {
            bet = parseInt(document.getElementById('betField').value);
            if(isNaN(bet) || bet <= 0 || bet > balance) {
                tg.showAlert("⚠️ Перевір ставку!");
                return;
            }

            balance -= bet;
            active = true;
            gemsFound = 0;
            currentCoef = 1.0;
            bombs = [];
            
            while(bombs.length < bombsCount) {
                let r = Math.floor(Math.random() * 25);
                if(!bombs.includes(r)) bombs.push(r);
            }

            createBoard();
            updateUI();
            
            document.getElementById('sBtn').style.display = 'none';
            document.getElementById('cBtn').style.display = 'block';
            document.getElementById('cBtn').innerText = `Забрати`;
            document.getElementById('bSelector').classList.add('disabled');
            document.getElementById('betField').classList.add('disabled');
        }

        function clickCell(i, el) {
            if(!active || el.innerText !== '') return;

            if(bombs.includes(i)) {
                el.innerText = '💣';
                el.classList.add('lose');
                document.getElementById('grid').classList.add('shake');
                endGame(false);
            } else {
                el.innerText = '💎';
                el.classList.add('win');
                gemsFound++;
                
                // Просунута формула коефіцієнта
                let safeTotal = 25 - bombsCount;
                currentCoef *= (safeTotal / (safeTotal - gemsFound + 1)) * 1.02;
                
                document.getElementById('cBtn').innerText = `Забрати ${(bet * currentCoef).toFixed(0)}`;
                updateUI();
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function cashout() {
            if(!active || gemsFound === 0) return;
            let win = Math.floor(bet * currentCoef);
            balance += win;
            tg.HapticFeedback.notificationOccurred('success');
            endGame(true);
        }

        function endGame(win) {
            active = false;
            document.getElementById('sBtn').style.display = 'block';
            document.getElementById('cBtn').style.display = 'none';
            document.getElementById('bSelector').classList.remove('disabled');
            document.getElementById('betField').classList.remove('disabled');
            
            // Показуємо всі бомби
            const cells = document.getElementsByClassName('cell');
            bombs.forEach(b => {
                if(cells[b].innerText === '') {
                    cells[b].innerText = '💣';
                    cells[b].style.opacity = '0.5';
                }
            });

            if(!win) tg.HapticFeedback.notificationOccurred('error');
            setTimeout(() => document.getElementById('grid').classList.remove('shake'), 400);
            updateUI();
        }

        updateUI();
        createBoard();
    </script>
</body>
</html>
