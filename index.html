<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; user-select: none; }
        
        .header { display: flex; justify-content: space-between; width: 100%; max-width: 320px; background: #1a1a1a; padding: 12px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 10px; }
        .balance { color: #4caf50; font-size: 18px; font-weight: 800; }
        .coef { color: #ffaa00; font-size: 18px; font-weight: 800; }

        .status-msg { margin-bottom: 10px; font-size: 14px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #1a1a1a; padding: 12px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #333; }
        .cell { width: 55px; height: 55px; background: #2a2a2a; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: 0.15s; position: relative; }
        .cell:active { transform: scale(0.9); }
        .cell.win { background: linear-gradient(145deg, #2e7d32, #1b5e20); box-shadow: 0 0 10px rgba(76, 175, 80, 0.4); }
        .cell.lose { background: linear-gradient(145deg, #c62828, #b71c1c); box-shadow: 0 0 10px rgba(244, 67, 54, 0.4); }
        .cell.disabled { pointer-events: none; }

        .controls { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 12px; }
        
        /* СЕКТОР ВИБОРУ БОМБ */
        .bomb-selector { display: flex; background: #1a1a1a; padding: 5px; border-radius: 10px; gap: 5px; }
        .bomb-btn { flex: 1; padding: 10px; border: none; background: transparent; color: #666; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .bomb-btn.active { background: #248b91; color: white; box-shadow: 0 2px 8px rgba(36, 139, 145, 0.4); }

        .bet-row { display: flex; gap: 10px; }
        input { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 16px; font-weight: bold; outline: none; }
        
        .btn-main { flex: 1; padding: 14px; border-radius: 10px; border: none; font-weight: 900; font-size: 16px; cursor: pointer; color: white; transition: 0.2s; text-transform: uppercase; }
        .btn-start { background: #248b91; }
        .btn-cashout { background: #ff8f00; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance">💰 <span id="balanceDisplay">1000</span></div>
        <div class="coef">x<span id="coefDisplay">1.00</span></div>
    </div>

    <div id="statusMsg" class="status-msg">Виберіть кількість бомб</div>

    <div class="grid" id="grid"></div>

    <div class="controls">
        <div class="bomb-selector" id="bombSelector">
            <button class="bomb-btn" onclick="selectBombs(3, this)">3</button>
            <button class="bomb-btn active" onclick="selectBombs(5, this)">5</button>
            <button class="bomb-btn" onclick="selectBombs(10, this)">10</button>
            <button class="bomb-btn" onclick="selectBombs(20, this)">20</button>
        </div>

        <div class="bet-row">
            <input type="number" id="betInput" value="100" inputmode="numeric">
            <button id="startBtn" class="btn-main btn-start" onclick="startGame()">Старт</button>
            <button id="cashoutBtn" class="btn-main btn-cashout" onclick="cashout()">Забрати</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseInt(localStorage.getItem('m_bal')) || 1000;
        let bet = 0;
        let coef = 1.0;
        let bombsCount = 5;
        let bombPositions = [];
        let gameActive = false;
        let openedCount = 0;

        // Вибір кількості бомб
        function selectBombs(count, btn) {
            if (gameActive) return;
            bombsCount = count;
            document.querySelectorAll('.bomb-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function updateDisplay() {
            document.getElementById('balanceDisplay').innerText = balance;
            document.getElementById('coefDisplay').innerText = coef.toFixed(2);
            localStorage.setItem('m_bal', balance);
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = 'c-' + i;
                cell.onclick = () => handleCellClick(i);
                grid.appendChild(cell);
            }
        }

        function startGame() {
            bet = parseInt(document.getElementById('betInput').value);
            if (isNaN(bet) || bet <= 0 || bet > balance) {
                tg.showAlert("Недостатньо коштів або невірна ставка!");
                return;
            }

            balance -= bet;
            coef = 1.0;
            openedCount = 0;
            gameActive = true;
            bombPositions = [];

            // Генерація бомб
            while(bombPositions.length < bombsCount) {
                let r = Math.floor(Math.random() * 25);
                if(!bombPositions.includes(r)) bombPositions.push(r);
            }

            createGrid();
            updateDisplay();
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('cashoutBtn').style.display = 'block';
            document.getElementById('bombSelector').style.opacity = '0.5';
            document.getElementById('betInput').disabled = true;
            document.getElementById('statusMsg').innerText = "Гра почалася! Шукай 💎";
            document.getElementById('statusMsg').style.color = "#4caf50";
        }

        function handleCellClick(idx) {
            if (!gameActive) return;
            const cell = document.getElementById('c-' + idx);
            if (cell.classList.contains('disabled') || cell.innerText !== '') return;

            if (bombPositions.includes(idx)) {
                // ВИБУХ
                cell.innerText = '💣';
                cell.classList.add('lose');
                finishGame(false);
            } else {
                // ДІАМАНТ
                cell.innerText = '💎';
                cell.classList.add('win');
                cell.classList.add('disabled');
                openedCount++;

                // ЛОГІКА КОЕФІЦІЄНТА (залежить від кількості бомб)
                // Формула: чим менше вільних клітинок, тим вище ризик і прибуток
                let remainingSafe = (25 - bombsCount) - (openedCount - 1);
                let step = (bombsCount / remainingSafe) * 1.2;
                coef += step;

                document.getElementById('statusMsg').innerText = `Коефіцієнт: x${coef.toFixed(2)}`;
                updateDisplay();
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function cashout() {
            if (!gameActive || openedCount === 0) return;
            let win = Math.floor(bet * coef);
            balance += win;
            tg.showAlert(`✅ Виграш: ${win}!`);
            finishGame(true);
        }

        function finishGame(win) {
            gameActive = false;
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('cashoutBtn').style.display = 'none';
            document.getElementById('bombSelector').style.opacity = '1';
            document.getElementById('betInput').disabled = false;

            // Показуємо всі міни, які залишилися
            bombPositions.forEach(p => {
                const bc = document.getElementById('c-' + p);
                if (bc.innerText !== '💣') {
                    bc.innerText = '💣';
                    bc.style.opacity = '0.4';
                }
            });

            if (!win) {
                document.getElementById('statusMsg').innerText = "💥 Програш!";
                document.getElementById('statusMsg').style.color = "#f44336";
                tg.HapticFeedback.notificationOccurred('error');
            } else {
                document.getElementById('statusMsg').innerText = "Чекаємо нову ставку";
                document.getElementById('statusMsg').style.color = "#888";
            }
            updateDisplay();
        }

        updateDisplay();
        createGrid();
    </script>
</body>
</html>
